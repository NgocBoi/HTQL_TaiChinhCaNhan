name: Build and Push Docker Images to Docker Hub

on:
  push:
    branches:
      - main  # Tự động chạy mỗi khi push code vào nhánh main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # Bước 1: Lấy mã nguồn từ GitHub về máy ảo của GitHub
    - name: Checkout code
      uses: actions/checkout@v4

    # Bước 2: Đăng nhập vào Docker Hub (Đã sửa lỗi dấu chấm)
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    # Bước 3: Đóng gói và đẩy Backend lên Docker Hub (Ép không dùng cache)
    - name: Build and Push Backend Image
      uses: docker/build-push-action@v5
      with:
        context: ./back-end
        push: true
        tags: thuongmay/squirrel-backend:latest
        no-cache: true

    # Bước 4: Đóng gói và đẩy Frontend lên Docker Hub (Ép không dùng cache)
    - name: Build and Push Frontend Image
      uses: docker/build-push-action@v5
      with:
        context: ./front-end
        push: true
        tags: thuongmay/squirrel-frontend:latest
        no-cache: true
